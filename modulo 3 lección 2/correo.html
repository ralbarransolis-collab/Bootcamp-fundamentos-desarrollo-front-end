<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Verificar correo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #e9ecef;
        }

        header {
            background-color: #495057;
            color: white;
        }

        .card-verificacion {
            background-color: white;
            border-left: 5px solid #198754;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #d1e7dd;
            margin-top: 25px;
        }

        .btn-validar {
            background-color: #198754;
            border-color: #198754;
        }

        .btn-validar:hover {
            background-color: #146c43;
            border-color: #146c43;
        }

        #resultado {
            font-weight: bold;
            color: #198754;
        }
    </style>

</head>

<body>

    <header class="p-3 mb-4">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-9 col-md-10">
                    <h1>Verificación de Correo Electrónico</h1>
                </div>

            </div>

        </div>

    </header>

    <main class="container">

        <section class="card-verificacion p-4">

            <div class="mb-3">

                <label class="form-label fw-bold text-secondary">
                    Ingrese Correo:
                </label>

                <input class="form-control" type="email" id="mail" placeholder="ejemplo@correo.com">

            </div>

            <div class="row align-items-center">

                <div class="col-md-6">
                    <strong>Válido:</strong>
                    <span id="resultado"></span>
                </div>

                <div class="col-md-6 text-end">
                    <button class="btn btn-validar text-white" onclick="validar()">
                        Validar
                    </button>
                </div>

            </div>

        </section>

    </main>

    <script>
        function validar() {

            let correo = document.getElementById("mail").value;

            if (correo.includes("@") && correo.includes(".")) {
                document.getElementById("resultado").textContent = "Si";
            } else {
                document.getElementById("resultado").textContent = "No";
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <footer class="bg-secondary text-white text-center p-3 mt-5 border-top border-success border-3">
        Diseñado por <kbd class="bg-success text-white">CHOCOLAT</kbd>
    </footer>
</body>

</html>
