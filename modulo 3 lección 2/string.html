<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ejemplo de strings</title>

</head>

<body>

    <button onclick="strings();">Ejecutar</button>

    <script>

        function strings() {

            var calle = `Calle Principal`;

            var numero = 100;



            console.log(calle);

            console.log("Largo de cadena: " + calle.length);

            console.log("Primer caracter: " + calle.charAt(0));

            console.log("Último caracter: " + calle.charAt(calle.length - 1));

            console.log("Dirección: " + calle.concat(" ", numero));

            console.log(calle.split(" "));

            //console.log("Yo vivo en la calle " + calle + "y el número demi casa es: " + numero);

            console.log(`Yo vivo en ${calle} + y el número de mi casa es ${numero}`);

            }

    </script>

</body>

</html>
