<!DOCTYPE html>

<html lang="es">

    <head>

        <meta charset="UTF-8">

        <title>Préstamo de Libros</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body>

        <div class="container mt-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    Sistema de Préstamo de Libros

                </div>

                <div class="card-body">

                    <h3 id="tituloLibro">El Principito</h3>

                    <p id="resultado" class="alert alert-secondary">

                        Estado inicial: Disponible

                    </p>

                    <button class="btn btn-primary" onclick="libro.prestar()">

                        Prestar

                    </button>

                    <button class="btn btn-primary" onclick="libro.devolver()">

                        Devolver

                    </button>

                    <button class="btn btn-primary" onclick="libro.estado()">

                        Ver Estado

                    </button>

                </div>

            </div>

        </div>

        <script>

            class Libro {

                #prestado = false;

                prestar() {

                    if (this.#prestado) {

                        this.mostrarMensaje("El libro ya está prestado.");

                    } else {

                        this.#prestado = true;

                        this.mostrarMensaje("Libro prestado correctamente.");

                    }

                }

                devolver() {

                    if (!this.#prestado) {

                        this.mostrarMensaje("El libro ya está disponible.");

                    } else {

                        this.#prestado = false;

                        this.mostrarMensaje("Libro devuelto correctamente.");

                    }

                }

                estado() {

                    if (this.#prestado) {

                        this.mostrarMensaje("Estado: Prestado");

                    } else {

                        this.mostrarMensaje("Estado: Disponible");

                    }

                }

                mostrarMensaje(texto) {

                    document.getElementById("resultado").textContent = texto;

                }

            }

            const libro = new Libro();

        </script>

    </body>

</html>
