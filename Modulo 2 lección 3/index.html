<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Envío de datos</title>
    </head>
    <body>
        <h1>Envío de datos</h1>
        <p>EL siguiente formulario permite enviar datos personales.</p>
        <p>Por favor complete todos los datos</p>

        <form action="./datos.html" method="post">
            <label>Ingrese su nombre</label>
            <input type="text" id="nombre" name="nombre" required>

            <label>Ingrese su edad:</label>
            <input type="number" id="edad" name="edad" min="1" max="120" required>

            <label>Ingrese su email:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Enviar</button>
        </form>

    </body>
</html>
