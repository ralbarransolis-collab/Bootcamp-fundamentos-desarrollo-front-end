<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mi primera página con JavaScript</title>
    </head>
    <body>
        <h1>Mi primera página con JavaScript</h1>

        <input type="text" placeholder="Ingrese nombre" id="nombre usuario">

       <button onclick="alerta()">Mostrar alerta</button>

        <script>
         function alerta() {
           //declaro la variable nombre
           //let nombre;

            //asigno la variable nombre
           //nombre= "Tirifila";

           let nombre=document.getElementById("nombre usuario").value;

            //muestro una alerta con el valor
           alert(nombre);
         }
            
        </script>
    </body>
</html>
