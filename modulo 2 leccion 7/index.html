<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro estudiantes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <nav class="navbar navbar-expand-sm bg-success navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"></a>
            <img src="./img/udc.png" alt="Escudo" style="width:35px;" class="img-thumbnail">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Quiénes somos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sedes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contacto</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown">Facultades</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Ingeniería</a></li>
                            <li><a class="dropdown-item" href="#">Ciencias Sociales</a></li>
                            <li><a class="dropdown-item" href="#">Arquitectura</a></li>
                            <li><a class="dropdown-item" href="#">Ciencias Médicas</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 bg-secondary p-4 rounded">
        <h1 class="text-center text-white display-4">Registro de Estudiantes</h1>
        <p class="h5">Ingrese los siguientes datos</p>
        <div class="mb-3">
        <label>Ingrese su nombre</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Nombre" class="form-control">
        </div>
        <div class="mb-3">
        <label>Ingrese su apellido</label>
        <input type="text" Id="apellido" name="Apellido" required placeholder="Apellido" class="form-control">
        </div>
        <div class="mb-3">
        <label>Ingrese su edad:</label>
        <input type="number" id="edad" name="edad" min="1" max="120" required placeholder="Edad" class="form-control">
        </div>
        <div class="mb-3">
        <label>Ingrese su carrera:</label>
        <input type="text" id="carrera" name="carrera" required placeholder="Carrerra" class="form-control">
        </div>
        <button type="button" class="btn btn-primary" onclick="mostrarPerfil()">Mostrar Perfil </button>
        <div id="perfil" class="mt-3 text-white"></div>
    </div>
    <script>
        function mostrarPerfil() {

            let nombre = document.getElementById("nombre").value;
            let apellido = document.getElementById("apellido").value;
            let edad = document.getElementById("edad").value;
            let carrera = document.getElementById("carrera").value;

            document.getElementById("perfil").innerHTML =
                "<h3>Perfil del Estudiante</h3>" +
                "<p><strong>Nombre:</strong> " + nombre + "</p>" +
                "<p><strong>Apellido:</strong> " + apellido + "</p>" +
                "<p><strong>Edad:</strong> " + edad + "</p>" +
                "<p><strong>Carrera:</strong> " + carrera + "</p>";
        }
    </script>
    <footer>

    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
