<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Conteo de Vocales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="d-flex flex-column">

    <main class="container flex-grow-1 d-flex justify-content-center align-items-center">

        <section class="contenedor p-4 p-md-5 text-center col-12 col-md-8 col-lg-6">

            <h1 class="mb-3">Conteo de Vocales</h1>

            <p class="mb-4">
                Ingresa varias palabras y el programa contará la cantidad total de vocales.
            </p>

            <button class="btn btn-cafe mb-4" onclick="ejecutar();">
                Ejecutar
            </button>

            <p id="palabras" class="mt-3"></p>

            <h2 id="resultado">
                El resultado aparecerá aquí
            </h2>


        </section>

    </main>

    <footer class="text-center py-3">
        Diseñado por <kbd>CHOCOLAT</kbd>
    </footer>

    <script src="./js/app.js"></script>

</body>

</html>
