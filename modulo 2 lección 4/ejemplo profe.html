<!DOCTYPE html>

<html lang="es">

    <head>

        <meta charset="UTF-8">

        <title>Mi primera página con Bootstrap</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body>

        <div class="container mt-5 bg-light p-4 rounded shadow">

            <header>

                <h1 class="text-center">Mi empresa</h1>

            </header>

            <main>

                <section>

                    <h2 class="text-center">Bienvenida</h2>

                    <p class="text-body text-center">Sean todos bienvenidos a nuestro nuevo sitio web</p>

                </section>
                <section>
                    <h2 class="text-center">Contacto</h2>
                    <form action="#" method="post">
                        <div class="mt-3 mb-3">
                            <label for="nombre" class="form-label">Nombre: </label>
                            <input type="text" id="nombre" placeholder="Ingrese su nombre" class="form-control">
                        </div>
                        <div class="mt-3 mb-3">
                            <label for="mensaje" class="form-label">Mensaje: </label>
                            <textarea id="mensaje" placeholder="Ingrese su mensaje" class="form-control"></textarea>
                        </div>
                        <div class="text-end">
                            <button class="btn btn-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </div>
                    </form>
                </section>
            </main>
            <footer>
                <h6 class="text-center">Sitio creado por <small>XXXXX</small></h6>
            </footer>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
