<!DOCTYPE html>

<html lang="es">

    <head>

        <meta charset="UTF-8">

        <title>Ejemplo de setInterval</title>

    </head>

    <body>

        <h1>Contador Automático</h1>

        <p id="contador">0</p>

        <script>

            let numero = 0;

            setInterval(function() {

                numero++;

                document.getElementById("contador").textContent = numero;

            }, 1000);

        </script>

    </body>

</html>
