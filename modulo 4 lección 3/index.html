<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de método privado</title>
</head>
<body>  
<button onclick="ejecutar()">Ejecutar</button>
<script>
    class Persona {
        #nombre;
        #edad;

        constructor (nombre, edad) {
            this.#nombre = nombre;
            this.#edad = edad;
        }
        //Metodo privado, solo puede ser vista por la clase.
        #esMayordeEdad(){
            return this.#edad > 18;
        }
        obtenerInformacion () {
            if (this.#esMayordeEdad()){
                return `${this.#nombre} tiene ${this.#edad} y es mayor de edad`;
            }else{
                return `${this.#nombre} tiene ${this.#edad} y es menor de edad`;
            }
        }
    }
        function ejecutar () {

            // se generan los objetos persona1 y persona2 al ser privado el metodo el objeto no lo puede leer, solo la clase.

            let persona1 = new Persona ('Javier', 30);
            let persona2 = new Persona ('Elena', 17);

            alert (persona1.obtenerInformacion());
            alert (persona2.obtenerInformacion());

            //Intenta acceder a un método privado: ¡Error!, no aparecerá la alerta
            alert(persona1.esMayordeEdad());

        }

</script>
</body>
</html>
