<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio de profundización</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <header>
        <div class="p-4 bg-success text-light text-center shadow">
            <h1 class="mb-0">Operaciones aritméticas</h1>
            <p class="mb-0">Calculadora básica con Bootstrap</p>
        </div>
    </header>

    <main class="container-fluid my-4">
        <div class="row g-4">

            <aside class="col-md-3 col-lg-2">
                <nav class="navbar bg-white rounded shadow-sm p-3">
                    <div class="container-fluid d-block">
                        <h6 class="text-uppercase text-success fw-bold mb-3">Menú</h6>

                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="index.html" class="nav-link active">Operaciones</a>
                            </li>
                            <li class="nav-item">
                                <a href="./acerca.html" class="nav-link">Acerca de</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <section class="col-md-9 col-lg-10">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-light">
                        <h5 class="mb-0">Formulario de cálculo</h5>
                    </div>

                    <div class="card-body p-4">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Número 1:</label>
                            <input type="number" placeholder="Ingrese el primer número" id="numero1" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Número 2:</label>
                            <input type="number" placeholder="Ingrese el segundo número" id="numero2" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Operaciones:</label>
                            <select id="operacion" class="form-select">
                                <option value="0">Seleccione una opción</option>
                                <option value="1">Sumar</option>
                                <option value="2">Restar</option>
                                <option value="3">Multiplicar</option>
                                <option value="4">Dividir</option>
                            </select>
                        </div>

                        <div class="alert alert-success text-center fw-bold" role="alert">
                            Resultado: <span id="resultado"></span>
                        </div>

                        <div class="text-end">
                            <button class="btn btn-success px-4" id="calcular" onclick="operacion();">
                                Calcular
                            </button>
                        </div>

                    </div>
                </div>
            </section>

        </div>
    </main>

    <footer>
        <div class="mt-3 p-3 bg-success text-light text-center">
            <p class="mb-0">Desarrollado por <kbd>CHOCOLAT</kbd></p>
        </div>
    </footer>

    <script>
        function operacion() {
            const numero1 = Number(document.getElementById("numero1").value);
            const numero2 = Number(document.getElementById("numero2").value);

            let resultado;

            if (document.getElementById("operacion").value == "1") {
                resultado = numero1 + numero2;
            } else if (document.getElementById("operacion").value == "2") {
                resultado = numero1 - numero2;
            } else if (document.getElementById("operacion").value == "3") {
                resultado = numero1 * numero2;
            } else if (document.getElementById("operacion").value == "4") {
                resultado = numero1 / numero2;
            } else {
                resultado = "";
            }

            document.getElementById("resultado").textContent = resultado;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
