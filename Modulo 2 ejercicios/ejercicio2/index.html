<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>transformación de grados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header>
        <div class="p-4 bg-secondary text-light text-center shadow">
            <h1 class="mb-0">Conversión grados de temperatura</h1>
        </div>
    </header>

    <main class="container-fluid flex-grow-1 my-4">
        <div class="row g-4">

            <aside class="col-md-3 col-lg-2">
                <nav class="navbar bg-white rounded shadow-lg p-3">
                    <div class="container-fluid d-block">
                        <h6 class="text-uppercase text-dark fw-bold mb-3">Menú</h6>

                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="index.html" class="nav-link active">Conversión</a>
                            </li>
                            <li class="nav-item">
                                <a href="./grados celsius.html" class="nav-link">Grados Celsius</a>
                            </li>
                            <li class="nav-item">
                                <a href="./grados kelvin.html" class="nav-link">Grados Kelvin</a>
                            </li>
                            <li class="nav-item">
                                <a href="./grados farenheit.html" class="nav-link">Grados Fahrenheit</a>
                            </li>
                            <li class="nav-item">
                                <a href="./conversiones.html" class="nav-link">Como se calcula</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <section class="col-md-9 col-lg-10">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-secondary text-light">
                        <h5 class="mb-0">Formulario de cálculo</h5>
                    </div>

                    <div class="card-body p-4">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Temperatura:</label>
                            <input type="number" placeholder="valor" id="temperatura" class="form-control">
                        </div>
                        

                        <div class="mb-3">
                            <label class="form-label fw-bold">Conversiones:</label>
                            <select id="conversion" class="form-select">
                                <option value="0">Seleccione una opción</option>
                                <option value="1">De grados Celsius a Fahrenheit</option>
                                <option value="2">De grados Celsius a Kelvin</option>
                                <option value="3">De grados Fahrenheit a Kelvin</option>
                                <option value="4">De grados Fahrenheit a Celsius</option>
                                <option value="5">De grados Kelvin a Celsius</option>
                                <option value="6">De grados Kelvin a Fahrenheit</option>
                            </select>

                        </div>
                        <div class="text-end mb-2">
                            <button class="btn btn-secondary px-4" id="btnconvertir" onclick="convertir();">
                                Convertir
                            </button>
                        </div>

                        <div class="alert alert-secondary text-center p-3 fw-bold" role="alert">
                            Resultado: <span id="resultado"></span>
                        </div>


                    </div>
                </div>
            </section>

        </div>
    </main>

    <footer>
        <div class="mt-3 p-3 bg-secondary text-light text-center">
            <p class="mb-0"><strong>Desarrollado por<kbd>CHOCOLAT</kbd></strong></p>
        </div>
    </footer>

    <script>
        function convertir() {
            const temperatura = Number(document.getElementById("temperatura").value);

            let resultado;

            if (document.getElementById("conversion").value == "1") {
                resultado = ((temperatura * 9) / 5) + 32;

            } else if (document.getElementById("conversion").value == "2") {
                resultado = temperatura + 273.15;

            } else if (document.getElementById("conversion").value == "3") {
                resultado = ((temperatura - 32) * 5 / 9) + 273.15;

            } else if (document.getElementById("conversion").value == "4") {
                resultado = (temperatura - 32) * 5 / 9;

            } else if (document.getElementById("conversion").value == "5") {
                resultado = temperatura - 273.15;

            } else if (document.getElementById("conversion").value == "6") {
                resultado = ((temperatura - 273.15) * 9 / 5) + 32;

            } else {
                resultado = "";
            }

            document.getElementById("resultado").textContent = resultado;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
