<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Bono por Cargas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header class="text-center my-3">
        <h2>Cálculo de bono por carga</h2>
    </header>

    <main class="container-fluid">
        <div class="row">

            <section class="col-md-9">

                <form>

                    <div class="mb-3">
                        <label class="form-label">Sueldo líquido</label>
                        <input type="number" class="form-control" placeholder="Ingrese sueldo" id="sueldo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cargas</label>
                        <select id="cargas" class="form-select">
                            <option value="0">Seleccione una opción</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                        </select>
                    </div>

                </form>

                <div class="text-end mb-3">
                    <button type="button" class="btn btn-secondary px-4" onclick="bono();">
                        Calcular
                    </button>
                </div>

                <div class="fs-5">
                    Resultado: <span id="resultado"></span>
                </div>

            </section>

            <aside class="col-md-3">
                <h3>Qué calcula</h3>
                <ul>
                    <li>El monto del bono que recibirá cada colaborador según la cantidad de cargas.</li>
                    <li>El bono se calcula en base al 2% del sueldo por cada carga.</li>
                </ul>
            </aside>

        </div>
    </main>

    <script>

        function bono() {

            const sueldo = Number(document.getElementById("sueldo").value);
            const cargas = Number(document.getElementById("cargas").value);

            let resultado = sueldo * 0.02 * cargas;

            document.getElementById("resultado").textContent =
                "$ " + resultado.toLocaleString("es-CL");

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
