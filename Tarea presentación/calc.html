<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>
<style>
body {
  background: #f2f2f2;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.calculadora {
  background: #2f3e4c;
  padding: 22px;
  border-radius: 25px;
  width: 260px;
}

#pantalla {
  width: 100%;
  height: 60px;
  font-size: 40px;
  text-align: right;
  margin-bottom: 20px;
  border-radius: 8px;
  border: none;
  background: #dcecf8;
  padding: 5px 10px;
  box-sizing: border-box;
}

.botones {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 55px;
  font-size: 36px;
  border: none;
  border-radius: 7px;
  background: white;
  cursor: pointer;
}

button:hover {
  background: #e6e6e6;
}

.igual {
  background: #ff7a00;
  color: black;
}

.igual:hover {
  background: #e86f00;
}
</style>
</head>

<body>

<div class="calculadora">
  <input type="text" id="pantalla" value="0" disabled>

  <div class="botones">
    <button onclick="agregar('7')">7</button>
    <button onclick="agregar('8')">8</button>
    <button onclick="agregar('9')">9</button>
    <button onclick="agregar('/')">÷</button>

    <button onclick="agregar('4')">4</button>
    <button onclick="agregar('5')">5</button>
    <button onclick="agregar('6')">6</button>
    <button onclick="agregar('*')">×</button>

    <button onclick="agregar('1')">1</button>
    <button onclick="agregar('2')">2</button>
    <button onclick="agregar('3')">3</button>
    <button onclick="agregar('-')">−</button>

    <button onclick="agregar('0')">0</button>
    <button onclick="agregar('.')">.</button>
    <button onclick="agregar('+')">+</button>
    <button class="igual" onclick="calcular()">=</button>
  </div>
</div>

<script>
function agregar(valor) {
  let pantalla = document.getElementById("pantalla");

  if (pantalla.value === "0") {
    pantalla.value = valor;
  } else {
    pantalla.value += valor;
  }
}

function calcular() {
  let pantalla = document.getElementById("pantalla");

  try {
    pantalla.value = eval(pantalla.value);
  } catch {
    pantalla.value = "Error";
  }
}
</script>

</body>
</html>
