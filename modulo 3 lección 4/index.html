<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Multiplicación por Sumas Sucesivas</title>
</head>

<body>

    <h1>Multiplicación por Sumas Sucesivas</h1>

    <label for="numero1">Número</label>
    <input type="number" id="numero1">

    <br><br>

    <label for="veces">Veces</label>
    <input type="number" id="veces">

    <br><br>

    <button onclick="calcular();">Calcular</button>

    <p id="resultado"></p>

    <script>

        function calcular() {

            let numero1 = Number(document.getElementById("numero1").value);
            let veces = Number(document.getElementById("veces").value);

            let resultado = 0;

            for (let i = 1; i <= veces; i++) {

                resultado += numero1;
                //resultado = resultado + numero1;
                console.log("Iteración " + i + ": " + resultado);
            }

            document.getElementById("resultado").innerHTML =
                "Resultado: " + resultado;

        }

    </script>

</body>

</html>
