<!doctype html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Verificación de Edad</title>

    <link

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

      rel="stylesheet"

    />

  </head>

  <body>

    <main class="container mt-5">

      <section>

        <div class="w-50 mx-auto">

          <div class="card shadow p-4">

            <h2 class="mb-4">Verificación de Edad</h2>

            <div class="mb-3">

              <label for="nombre" class="form-label">Ingrese su nombre</label>

              <input type="text" id="nombre" class="form-control" />

            </div>

            <div class="mb-3">

              <label for="edad" class="form-label">Ingrese su edad</label>

              <input type="number" id="edad" class="form-control" />

            </div>
            <button class="btn btn-success" onclick="verificarEdad()">

              Verificar

            </button>

          </div>

        </div>

      </section>

      <section class="mt-4">

        <div id="perfil"></div>

      </section>

    </main>

    <script>

      function verificarEdad() {

        const nombre = document.getElementById("nombre").value;

        const edad = parseInt(document.getElementById("edad").value);

        let mayorEdad = false;

        if (edad >= 18) {

          mayorEdad = true;

        } else {

          mayorEdad = false;

        }

        if (mayorEdad) {

          document.getElementById("perfil").innerHTML = `

    <div >

        <div class="card shadow p-3">

                <p>Nombre: ${nombre}</p>

                <p>Edad: ${edad}</p>

                <p class="text-success">Es mayor de edad.</p>

                </div>

                </div>`;

        } else {

          document.getElementById("perfil").innerHTML = `

    <div>

        <div class="card shadow p-3">

                <p>Nombre: ${nombre}</p>

                <p>Edad: ${edad}</p>

                <p class="text-danger">No es mayor de edad.</p>

                </div>

                </div>`;

        }

      }

    </script>

  </body>

</html>
